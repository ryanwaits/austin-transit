# Render Blueprint (Infrastructure as Code) for the continuous OTP run.
# Mirrors docker-compose.yml: a PostGIS database, an always-on poller, and a
# weekly cron job that reloads the static GTFS schedule.
#
# Deploy: push this repo to GitHub/GitLab, then in the Render dashboard create a
# new Blueprint pointing at it. The poller's runMigrations() creates the schema
# on first boot (incl. CREATE EXTENSION postgis — supported on Render PG16).
#
# Cost/storage note: the realtime tables grow fast (~175M trip_stop_time_update
# rows/week, tens of GB). Size the database disk for the full collection window,
# or trim the `raw` JSONB / offload raw feeds to object storage to shrink it.

databases:
  - name: austin-transit-db
    databaseName: austintransit
    user: austintransit
    postgresMajorVersion: "16"
    plan: standard # bump the plan/disk to cover the expected multi-GB volume
    region: oregon

services:
  # Always-on GTFS-RT poller (the long-running Bun loop).
  - type: worker
    name: austin-transit-poller
    runtime: docker
    dockerfilePath: ./Dockerfile.poller
    plan: starter
    region: oregon
    autoDeploy: false
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: austin-transit-db
          property: connectionString
      - key: GTFS_RT_VEHICLE_POSITIONS_URL
        value: https://data.texas.gov/download/eiei-9rpf/application%2Foctet-stream
      - key: GTFS_RT_TRIP_UPDATES_URL
        value: https://data.texas.gov/download/rmk2-acnw/application%2Foctet-stream
      - key: POLL_INTERVAL_MS
        value: "30000"
      # Optional R2 archive of raw protobuf feeds. Set these (sync: false keeps
      # secrets out of the blueprint) to enable; omit to disable archiving.
      - key: R2_ACCOUNT_ID
        sync: false
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false
      - key: R2_BUCKET
        sync: false

  # Weekly static GTFS reload (runs to completion, then exits).
  - type: cron
    name: austin-transit-loader
    runtime: docker
    dockerfilePath: ./Dockerfile.loader
    region: oregon
    schedule: "0 9 * * 1" # Mondays 09:00 UTC
    autoDeploy: false
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: austin-transit-db
          property: connectionString
      - key: GTFS_STATIC_URL
        value: https://data.texas.gov/download/r4v4-vz24/application%2Fzip
